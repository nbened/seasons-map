<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Seasons Map</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #f9f7f2;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }
  svg { width: min(680px, 100vw); height: auto; }
  .wedge { cursor: pointer; }
  .wedge .bg { transition: opacity 0.15s; }
  .wedge:hover .bg { opacity: 1 !important; }
  .center-btn { cursor: pointer; }
  .center-btn .cbg { transition: opacity 0.15s; }
  .center-btn:hover .cbg { opacity: 0.7 !important; }
</style>
</head>
<body>

<svg viewBox="0 0 680 660" xmlns="http://www.w3.org/2000/svg"
     style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;">

  <!-- OUTER SEASON WEDGES -->
  <g class="wedge" onclick="go(SPRING)">
    <path class="bg" d="M340,340 L340,120 A220,220 0 0,1 530.5,450 Z" fill="#c6e8b0" opacity="0.55"/>
  </g>
  <g class="wedge" onclick="go(SUMMER)">
    <path class="bg" d="M340,340 L530.5,450 A220,220 0 0,1 149.5,450 Z" fill="#f5d98a" opacity="0.5"/>
  </g>
  <g class="wedge" onclick="go(AUTUMN)">
    <path class="bg" d="M340,340 L149.5,450 A220,220 0 0,1 340,120 Z" fill="#f0b89a" opacity="0.5"/>
  </g>

  <circle cx="340" cy="340" r="220" fill="none" stroke="#c8c6be" stroke-width="0.8"/>

  <!-- MID RING base fills -->
  <path d="M340,340 L340,200 A140,140 0 0,1 461.2,410 Z" fill="#EAF3DE" opacity="0.55"/>
  <path d="M340,340 L461.2,410 A140,140 0 0,1 218.8,410 Z" fill="#FAEEDA" opacity="0.5"/>
  <path d="M340,340 L218.8,410 A140,140 0 0,1 340,200 Z" fill="#FAECE7" opacity="0.5"/>

  <!-- PILLAR WEDGES -->
  <g class="wedge" onclick="go(WINTER)">
    <path class="bg" d="M340,278 A62,62 0 0,1 393.7,371 L461.2,410 A140,140 0 0,0 340,200 Z" fill="#a8d870" opacity="0"/>
  </g>
  <g class="wedge" onclick="go(WINTER)">
    <path class="bg" d="M393.7,371 A62,62 0 0,1 286.3,371 L218.8,410 A140,140 0 0,0 461.2,410 Z" fill="#f0c850" opacity="0"/>
  </g>
  <g class="wedge" onclick="go(WINTER)">
    <path class="bg" d="M286.3,371 A62,62 0 0,1 340,278 L340,200 A140,140 0 0,0 218.8,410 Z" fill="#e89878" opacity="0"/>
  </g>

  <circle cx="340" cy="340" r="140" fill="none" stroke="#c8c6be" stroke-width="0.8"/>

  <!-- Dividers -->
  <line x1="340"   y1="278" x2="340"   y2="120" stroke="#c8c6be" stroke-width="0.8"/>
  <line x1="393.7" y1="371" x2="530.5" y2="450" stroke="#c8c6be" stroke-width="0.8"/>
  <line x1="286.3" y1="371" x2="149.5" y2="450" stroke="#c8c6be" stroke-width="0.8"/>

  <!-- Blue center -->
  <circle cx="340" cy="340" r="62" fill="#dbeafe" stroke="#93c5fd" stroke-width="0.8"/>
  <g class="center-btn" onclick="go(WINTER)">
    <circle class="cbg" cx="340" cy="340" r="62" fill="#93c5fd" opacity="0"/>
    <text font-size="12" font-weight="600" fill="#1e3a5f"
          x="340" y="344" text-anchor="middle" style="pointer-events:none">Spirituality</text>
  </g>

  <!-- RING LABELS -->
  <text font-size="10" font-weight="600" fill="#3b82f6"
        x="340" y="296" text-anchor="middle" style="pointer-events:none">I</text>
  <text font-size="10" font-weight="500" fill="#888680"
        x="340" y="212" text-anchor="middle" style="pointer-events:none">me</text>
  <text font-size="10" font-weight="500" fill="#888680"
        x="340" y="134" text-anchor="middle" style="pointer-events:none">growth</text>

  <!-- PILLAR LABELS -->
  <text font-size="15" x="431" y="263" text-anchor="middle" style="pointer-events:none">🧠</text>
  <text font-size="12" font-weight="600" fill="#3B6D11" x="431" y="280" text-anchor="middle" style="pointer-events:none">Mind</text>
  <text font-size="10" font-weight="500" fill="#6b9e3a" x="431" y="293" text-anchor="middle" style="pointer-events:none">daily</text>
  <text font-size="10" font-weight="500" fill="#6b9e3a" x="431" y="305" text-anchor="middle" style="pointer-events:none">practice</text>

  <text font-size="15" x="340" y="424" text-anchor="middle" style="pointer-events:none">⚡</text>
  <text font-size="12" font-weight="600" fill="#BA7517" x="340" y="441" text-anchor="middle" style="pointer-events:none">Body</text>
  <text font-size="10" font-weight="500" fill="#d4922a" x="340" y="454" text-anchor="middle" style="pointer-events:none">daily</text>
  <text font-size="10" font-weight="500" fill="#d4922a" x="340" y="466" text-anchor="middle" style="pointer-events:none">practice</text>

  <text font-size="15" x="249" y="263" text-anchor="middle" style="pointer-events:none">❤️</text>
  <text font-size="12" font-weight="600" fill="#993C1D" x="249" y="280" text-anchor="middle" style="pointer-events:none">Heart</text>
  <text font-size="10" font-weight="500" fill="#c0532e" x="249" y="293" text-anchor="middle" style="pointer-events:none">daily</text>
  <text font-size="10" font-weight="500" fill="#c0532e" x="249" y="305" text-anchor="middle" style="pointer-events:none">practice</text>

  <!-- SEASON LABELS -->
  <text font-size="13" font-weight="600" fill="#3B6D11" x="492" y="253" text-anchor="middle" style="pointer-events:none">🌱 Spring</text>
  <text font-size="10" font-weight="500" fill="#6b9e3a" x="492" y="268" text-anchor="middle" style="pointer-events:none">process</text>

  <text font-size="13" font-weight="600" fill="#BA7517" x="340" y="502" text-anchor="middle" style="pointer-events:none">☀️ Summer</text>
  <text font-size="10" font-weight="500" fill="#d4922a" x="340" y="517" text-anchor="middle" style="pointer-events:none">process</text>

  <text font-size="13" font-weight="600" fill="#993C1D" x="188" y="253" text-anchor="middle" style="pointer-events:none">🍁 Autumn</text>
  <text font-size="10" font-weight="500" fill="#c0532e" x="188" y="268" text-anchor="middle" style="pointer-events:none">process</text>

</svg>

<script>
const WINTER = 'https://www.notion.so/303d81dbbe8380f1a2b5f1258c2c0c08';
const SPRING = 'https://www.notion.so/303d81dbbe8380bdb9a8c1505fe90c1c';
const SUMMER = 'https://www.notion.so/303d81dbbe83803f9f38d19c846ce42c';
const AUTUMN = 'https://www.notion.so/303d81dbbe8380a09721d26e4d0c49aa';

function go(url) { window.open(url, '_blank'); }
</script>
</body>
</html>
