<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Seasons Map</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #f9f7f2;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }
  svg { width: min(680px, 100vw); height: auto; }

  .wedge { cursor: pointer; }
  .wedge .hit { fill: transparent; }
  .wedge .color {
    transition: fill 0.15s, opacity 0.15s;
    fill: transparent;
    opacity: 0;
  }
  .wedge:hover .color { fill: #b0ada8; opacity: 0.3; }
  .wedge.done .color { opacity: 1; }

  .center-btn { cursor: pointer; }
  .center-btn .cbg {
    transition: fill 0.15s, opacity 0.15s;
    fill: #b0ada8;
    opacity: 0;
  }
  .center-btn:hover .cbg { opacity: 0.3; }
  .center-btn.done .cbg { fill: #93c5fd; opacity: 1; }
</style>
</head>
<body>

<svg id="map" viewBox="0 0 680 660" xmlns="http://www.w3.org/2000/svg"
     style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;">

  <!-- OUTER SEASON WEDGES — static soft fill always visible -->
  <path d="M340,340 L340,120 A220,220 0 0,1 530.5,450 Z" fill="#c6e8b0" opacity="0"/>
  <path d="M340,340 L530.5,450 A220,220 0 0,1 149.5,450 Z" fill="#f5d98a" opacity="0"/>
  <path d="M340,340 L149.5,450 A220,220 0 0,1 340,120 Z" fill="#f0b89a" opacity="0"/>

  <!-- CLICKABLE outer wedge overlays -->
  <!-- Autumn: top-right wedge (above Mind) -->
  <g class="wedge" id="w-autumn" onclick="handleClick('autumn')">
    <path class="hit" d="M340,340 L340,120 A220,220 0 0,1 530.5,450 Z"/>
    <path class="color" d="M340,340 L340,120 A220,220 0 0,1 530.5,450 Z" data-color="#d87848"/>
  </g>
  <!-- Summer: bottom wedge -->
  <g class="wedge" id="w-summer" onclick="handleClick('summer')">
    <path class="hit" d="M340,340 L530.5,450 A220,220 0 0,1 149.5,450 Z"/>
    <path class="color" d="M340,340 L530.5,450 A220,220 0 0,1 149.5,450 Z" data-color="#e8b830"/>
  </g>
  <!-- Spring: top-left wedge (above Heart) -->
  <g class="wedge" id="w-spring" onclick="handleClick('spring')">
    <path class="hit" d="M340,340 L149.5,450 A220,220 0 0,1 340,120 Z"/>
    <path class="color" d="M340,340 L149.5,450 A220,220 0 0,1 340,120 Z" data-color="#7bc860"/>
  </g>

  <circle cx="340" cy="340" r="220" fill="none" stroke="#c8c6be" stroke-width="0.8"/>

  <!-- MID RING — solid gray background to block outer sector bleed -->
  <path d="M340,340 L340,200 A140,140 0 0,1 461.2,410 Z" fill="#f0ede8"/>
  <path d="M340,340 L461.2,410 A140,140 0 0,1 218.8,410 Z" fill="#f0ede8"/>
  <path d="M340,340 L218.8,410 A140,140 0 0,1 340,200 Z" fill="#f0ede8"/>

  <!-- CLICKABLE pillar wedge overlays -->
  <g class="wedge" id="w-mind" onclick="handleClick('mind')">
    <path class="hit"   d="M340,278 A62,62 0 0,1 393.7,371 L461.2,410 A140,140 0 0,0 340,200 Z"/>
    <path class="color" d="M340,278 A62,62 0 0,1 393.7,371 L461.2,410 A140,140 0 0,0 340,200 Z" data-color="#a8d870"/>
  </g>
  <g class="wedge" id="w-body" onclick="handleClick('body')">
    <path class="hit"   d="M393.7,371 A62,62 0 0,1 286.3,371 L218.8,410 A140,140 0 0,0 461.2,410 Z"/>
    <path class="color" d="M393.7,371 A62,62 0 0,1 286.3,371 L218.8,410 A140,140 0 0,0 461.2,410 Z" data-color="#f0c850"/>
  </g>
  <g class="wedge" id="w-heart" onclick="handleClick('heart')">
    <path class="hit"   d="M286.3,371 A62,62 0 0,1 340,278 L340,200 A140,140 0 0,0 218.8,410 Z"/>
    <path class="color" d="M286.3,371 A62,62 0 0,1 340,278 L340,200 A140,140 0 0,0 218.8,410 Z" data-color="#e89878"/>
  </g>

  <circle cx="340" cy="340" r="140" fill="none" stroke="#c8c6be" stroke-width="0.8"/>

  <!-- Dividers -->
  <line x1="340"   y1="278" x2="340"   y2="120" stroke="#c8c6be" stroke-width="0.8"/>
  <line x1="393.7" y1="371" x2="530.5" y2="450" stroke="#c8c6be" stroke-width="0.8"/>
  <line x1="286.3" y1="371" x2="149.5" y2="450" stroke="#c8c6be" stroke-width="0.8"/>

  <!-- Blue center base -->
  <circle cx="340" cy="340" r="62" fill="#e8f0fe" stroke="#c8c6be" stroke-width="0.8"/>

  <g class="center-btn" id="w-spirituality" onclick="handleClick('spirituality')">
    <circle class="cbg" cx="340" cy="340" r="62"/>
    <text font-size="16" x="340" y="326" text-anchor="middle" style="pointer-events:none">🌀</text>
    <text font-size="12" font-weight="600" fill="#1e3a5f"
          x="340" y="344" text-anchor="middle" style="pointer-events:none">Spirituality</text>
    <text font-size="9" font-weight="400" fill="#5580aa"
          x="340" y="358" text-anchor="middle" style="pointer-events:none">pray</text>
  </g>

  <!-- RING LABELS -->
  <text font-size="10" font-weight="600" fill="#3b82f6"
        x="340" y="296" text-anchor="middle" style="pointer-events:none">I</text>
  <text font-size="10" font-weight="500" fill="#888680"
        x="340" y="212" text-anchor="middle" style="pointer-events:none">me</text>
  <text font-size="10" font-weight="500" fill="#888680"
        x="340" y="134" text-anchor="middle" style="pointer-events:none">growth</text>

  <!-- PILLAR LABELS -->
  <text font-size="15" x="431" y="263" text-anchor="middle" style="pointer-events:none">🧠</text>
  <text font-size="12" font-weight="600" fill="#3B6D11" x="431" y="280" text-anchor="middle" style="pointer-events:none">Mind</text>
  <text font-size="10" font-weight="500" fill="#6b9e3a" x="431" y="299" text-anchor="middle" style="pointer-events:none">reframe</text>

  <text font-size="15" x="340" y="424" text-anchor="middle" style="pointer-events:none">⚡</text>
  <text font-size="12" font-weight="600" fill="#BA7517" x="340" y="441" text-anchor="middle" style="pointer-events:none">Body</text>
  <text font-size="10" font-weight="500" fill="#d4922a" x="340" y="460" text-anchor="middle" style="pointer-events:none">exercise</text>

  <text font-size="15" x="249" y="263" text-anchor="middle" style="pointer-events:none">❤️</text>
  <text font-size="12" font-weight="600" fill="#993C1D" x="249" y="280" text-anchor="middle" style="pointer-events:none">Heart</text>
  <text font-size="10" font-weight="500" fill="#c0532e" x="249" y="299" text-anchor="middle" style="pointer-events:none">love</text>

  <!-- SEASON LABELS -->
  <!-- Autumn: top-right, above Mind -->
  <text font-size="13" font-weight="600" fill="#993C1D" x="492" y="253" text-anchor="middle" style="pointer-events:none">🍁 Autumn</text>
  <text font-size="10" font-weight="500" fill="#c0532e" x="492" y="268" text-anchor="middle" style="pointer-events:none">let go</text>

  <!-- Summer: bottom -->
  <text font-size="13" font-weight="600" fill="#BA7517" x="340" y="502" text-anchor="middle" style="pointer-events:none">☀️ Summer</text>
  <text font-size="10" font-weight="500" fill="#d4922a" x="340" y="517" text-anchor="middle" style="pointer-events:none">play</text>

  <!-- Spring: top-left, above Heart -->
  <text font-size="13" font-weight="600" fill="#3B6D11" x="188" y="253" text-anchor="middle" style="pointer-events:none">🌱 Spring</text>
  <text font-size="10" font-weight="500" fill="#6b9e3a" x="188" y="268" text-anchor="middle" style="pointer-events:none">create</text>

</svg>

<script>
// const WINTER = 'https://www.notion.so/303d81dbbe8380f1a2b5f1258c2c0c08';
// const SPRING = 'https://www.notion.so/303d81dbbe8380bdb9a8c1505fe90c1c';
// const SUMMER = 'https://www.notion.so/303d81dbbe83803f9f38d19c846ce42c';
// const AUTUMN = 'https://www.notion.so/303d81dbbe8380a09721d26e4d0c49aa';

const SECTIONS = ['spring','summer','autumn','mind','body','heart','spirituality'];
const STORE_KEY = 'seasons_clicked';
const DATE_KEY  = 'seasons_date';

function todayPST() {
  return new Date().toLocaleDateString('en-CA', { timeZone: 'America/Los_Angeles' });
}

function loadState() {
  const storedDate = localStorage.getItem(DATE_KEY);
  const today = todayPST();
  if (storedDate !== today) {
    localStorage.setItem(DATE_KEY, today);
    localStorage.setItem(STORE_KEY, JSON.stringify({}));
    return {};
  }
  try { return JSON.parse(localStorage.getItem(STORE_KEY)) || {}; }
  catch(e) { return {}; }
}

function saveState(state) {
  localStorage.setItem(STORE_KEY, JSON.stringify(state));
}

function applyState(state) {
  SECTIONS.forEach(key => {
    const el = document.getElementById('w-' + key);
    if (!el) return;
    const colorEl = el.querySelector('.color, .cbg');
    if (state[key]) {
      el.classList.add('done');
      if (colorEl && colorEl.dataset.color) {
        colorEl.style.fill = colorEl.dataset.color;
        colorEl.style.opacity = '0.85';
      }
    } else {
      el.classList.remove('done');
      if (colorEl) {
        colorEl.style.fill = '';
        colorEl.style.opacity = '';
      }
    }
  });
}

function handleClick(key) {
  const state = loadState();
  state[key] = !state[key];
  saveState(state);
  applyState(state);
}

applyState(loadState());

setInterval(() => {
  if (localStorage.getItem(DATE_KEY) !== todayPST()) applyState(loadState());
}, 60000);
</script>
</body>
</html>
